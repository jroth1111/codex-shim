name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: pytest (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Compile check
        run: python -m compileall codex_shim/ -q
      - name: Lint (ruff)
        run: ruff check .
      - name: Type check (pyright)
        run: pyright
      - name: Desktop contract drift check
        run: python scripts/generate_desktop_contract.py --check  # skips without local RE tree
      - name: Desktop app-server contract drift check
        run: python scripts/generate_desktop_app_server_contract.py --check  # skips without local RE tree
      - name: Desktop patch needle drift check
        run: python scripts/check_desktop_patch_needles.py       # skips without local RE tree
      - name: Modular boundary check
        run: python scripts/check_module_boundaries.py
      - name: Cursor inference parity (shim self-check)
        run: python scripts/cursor_inference_parity.py --self-check --mode plan "ci self-check"
      - name: Upstream parity fixture check
        run: python -m pytest tests/test_diff_upstream_capture.py tests/test_upstream_replay.py tests/test_upstream_harness_fixtures.py tests/test_upstream_cli_harness_fixtures.py tests/test_upstream_cli_replay.py -q
      - name: Run tests
        run: python -m pytest tests/ -m "not live" -q
      - name: Compatibility probe matrix (offline)
        run: python -m codex_shim.cli probe matrix --json
      - name: Cursor inference parity (optional)
        if: vars.CURSOR_SOURCE_ROOT != ''
        env:
          CURSOR_SOURCE_ROOT: ${{ vars.CURSOR_SOURCE_ROOT }}
        run: python scripts/cursor_inference_parity.py --mode default "ci parity"
